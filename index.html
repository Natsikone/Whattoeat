<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Mitä tänään syötäisiin?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 10px;
    }

    #day {
      font-size: 22px;
      margin-bottom: 20px;
      font-weight: bold;
      color: red;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: red;
    }
  </style>
</head>
<body>

  <h1>Mitä tänään syötäisiin?</h1>

  <div id="day"></div>

  <button onclick="showFood()">Paina tästä</button>

  <div id="result"></div>

  <script>
    const days = [
      "Sunnuntai",
      "Maanantai",
      "Tiistai",
      "Keskiviikko",
      "Torstai",
      "Perjantai",
      "Lauantai"
    ];

    const today = new Date().getDay();
    document.getElementById("day").innerText = days[today];

    function showFood() {
      document.getElementById("result").innerText = "NAKKIMAKAROONIPATA";
    }
  </script>

</body>
</html>
