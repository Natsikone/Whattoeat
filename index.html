<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Mitä tänään syötäisiin?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 30px;
    }

    .days {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Mitä tänään syötäisiin?</h1>

  <div class="days">
    Maanantai | Tiistai | Keskiviikko | Torstai | Perjantai | Lauantai | Sunnuntai
  </div>

  <button onclick="showFood()">Paina tästä</button>

  <div id="result"></div>

  <script>
    function showFood() {
      document.getElementById("result").innerText = "Nakkimakaroonipata";
    }
  </script>

</body>
</html>
