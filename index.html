<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Mitä tänään syötäisiin?</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 10px;
    }

    #day {
      font-size: 22px;
      margin-bottom: 20px;
      font-weight: bold;
      color: red;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: normal;
      color: green;
    }
  </style>
</head>

<body>

  <h1>Mitä tänään syötäisiin?</h1>

  <div id="day"></div>

  <button onclick="showFood()">Paina tästä</button>

  <div id="result"></div>

  <script>
    const days = [
      "Sunnuntai",
      "Maanantai",
      "Tiistai",
      "Keskiviikko",
      "Torstai",
      "Perjantai",
      "Lauantai"
    ];

    const today = new Date().getDay();
    document.getElementById("day").innerText = days[today];

    function showFood() {
      document.getElementById("result").innerHTML = `
        <h2>NAKKIMAKAROONIPATA</h2>

        <h3>Ainekset:</h3>
        <ul style="text-align:left; display:inline-block;">
          <li>makaroneja</li>
          <li>nakkeja</li>
          <li>vettä</li>
          <li>suolaa</li>
          <li>öljyä tai voita paistamiseen</li>
          <li>(halutessa: ketsuppia)</li>
        </ul>

        <h3>Valmistusohje:</h3>
        <ol style="text-align:left; display:inline-block;">
          <li>Keitä makaroonit pakkauksen ohjeen mukaan suolatussa vedessä.</li>
          <li>Valuta kypsät makaroonit.</li>
          <li>Viipaloi nakit.</li>
          <li>Paista nakit pannulla kevyesti ruskistuen.</li>
          <li>Lisää keitetyt makaroonit pannulle nakkien joukkoon.</li>
          <li>Sekoita ja paista hetki, jotta maut yhdistyvät.</li>
          <li>Tarjoile lämpimänä (halutessa ketsupin kanssa).</li>
        </ol>
      `;
    }
  </script>

</body>
</html>
